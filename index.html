<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Video Downloader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 5px; color: #2c3e50; }
        .icons { font-size: 24px; margin-bottom: 20px; letter-spacing: 10px; }
        input { width: 90%; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #3498db; }
        button { padding: 15px 25px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 95%; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        #result { margin-top: 25px; font-size: 15px; }
        .btn-download { display: inline-block; padding: 12px 25px; background: #2ecc71; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.3); }
        .btn-download:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi Downloader</h2>
    <div class="icons">🎵 📸 📘 🐦 📺</div>
    <p style="color: #7f8c8d; margin-bottom: 25px;">Download video dari TikTok, IG, FB, X, dan YouTube!</p>
    
    <input type="text" id="videoUrl" placeholder="Tempel link video di sini...">
    <button id="downloadBtn" onclick="downloadVideo()">Cari & Download Video</button>
    
    <div id="result"></div>
</div>

<script>
    async function downloadVideo() {
        const url = document.getElementById('videoUrl').value.trim();
        const resDiv = document.getElementById('result');
        const btn = document.getElementById('downloadBtn');

        if (!url) {
            alert('Harap masukkan link video terlebih dahulu!');
            return;
        }

        resDiv.innerHTML = "<em>⏳ Sedang melewati jembatan server...<br>Proses ini mungkin memakan waktu sedikit lebih lama.</em>";
        btn.disabled = true;

        try {
            // Trik "Jembatan" (Menggunakan corsproxy.io)
            const targetUrl = encodeURIComponent('https://api.cobalt.tools/api/json');
            const proxyUrl = 'https://corsproxy.io/?' + targetUrl;

            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    url: url
                })
            });
            
            const data = await response.json();

            if (data.status === 'error') {
                resDiv.innerHTML = `<strong style='color:#e74c3c;'>Gagal:</strong> Video tidak ditemukan atau akun di-private. Cek kembali link Anda.`;
            } else if (data.url) {
                resDiv.innerHTML = `
                    <p><strong style="color:#2ecc71;">✅ Berhasil melewati jembatan!</strong></p>
                    <a href="${data.url}" target="_blank" class="btn-download">⬇️ Unduh File Sekarang</a>
                    <p style="font-size: 12px; margin-top:15px; color:#95a5a6;">(Catatan: Jika file terbuka di layar baru, klik ikon titik tiga [⋮] di pojok layar video lalu pilih "Download")</p>
                `;
            } else {
                resDiv.innerHTML = "<strong style='color:#e74c3c;'>Gagal memproses media.</strong><br>Sistem sedang penuh, silakan coba lagi.";
            }
        } catch (err) {
            resDiv.innerHTML = "<strong style='color:#e74c3c;'>Jembatan sedang penuh/sibuk!</strong><br>Ini adalah resiko menggunakan mesin pihak ketiga gratisan. Silakan coba lagi dalam beberapa menit.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
