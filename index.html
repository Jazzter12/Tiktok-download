<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader Gratis</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        input { width: 100%; max-width: 400px; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 12px 25px; background: #ff0050; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #result { margin-top: 20px; }
        video { width: 100%; max-width: 400px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>TikTok Downloader</h2>
    <input type="text" id="tiktokUrl" placeholder="Paste link TikTok di sini...">
    <br>
    <button onclick="downloadVideo()">Download Video</button>
    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('tiktokUrl').value;
            const resDiv = document.getElementById('result');
            
            // 👇 MASUKKAN API KEY ANDA DI SINI 👇
            const apiKey = 'e4232cefc2mshe945265f911ac17p1ed6d0jsn1e46e545e5c2'; 

            if (!url) return alert('Masukkan link dulu!');
            resDiv.innerHTML = "Sedang memproses...";

            try {
                const response = await fetch(`https://tiktok-video-no-watermark2.p.rapidapi.com/feed/list?url=${encodeURIComponent(url)}`, {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-key': apiKey,
                        'x-rapidapi-host': 'tiktok-video-no-watermark2.p.rapidapi.com'
                    }
                });
                const data = await response.json();
                if (data.status === "success") {
                    resDiv.innerHTML = `<a href="${data.result.video[0]}" download target="_blank">Klik untuk Unduh Video</a><br><video src="${data.result.video[0]}" controls></video>`;
                } else {
                    resDiv.innerHTML = "Gagal. Cek link dan coba lagi.";
                }
            } catch (err) {
                resDiv.innerHTML = "Terjadi kesalahan. Coba lagi nanti.";
            }
        }
    </script>
</body>
</html>
